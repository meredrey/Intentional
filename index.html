<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:#f5f7f3!important;color:#2c3828}
body{font-family:'Jost',sans-serif;font-weight:300;min-height:100vh}
@media(prefers-color-scheme:dark){html,body,div{background-color:inherit!important}}
.app-header{background:#4a6741;padding:max(28px,env(safe-area-inset-top)) 20px 14px;display:flex;align-items:center;gap:10px}
.app-logo-svg{width:28px;height:28px;flex-shrink:0}
.app-name{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:300;letter-spacing:0.2em;color:#f5f7f3;text-transform:uppercase}
.app-tagline{font-size:0.6rem;letter-spacing:0.18em;color:#a8bf90;text-transform:uppercase;margin-left:auto;flex-shrink:0}
.app-tabs{display:flex;background:white;border-bottom:1px solid #e4ebe2;position:sticky;top:0;z-index:400;box-shadow:0 2px 8px rgba(74,103,65,0.07)}
.app-tab{flex:1;padding:11px 4px;display:flex;flex-direction:column;align-items:center;gap:3px;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;font-family:'Jost',sans-serif;font-size:0.6rem;letter-spacing:0.12em;text-transform:uppercase;color:#8aaa78;transition:all 0.2s}
.app-tab .ti{font-size:1rem}
.app-tab.active{color:#4a6741;border-bottom-color:#4a6741;font-weight:500}
.panel{display:none;min-height:calc(100vh - 96px);padding-bottom:80px}
.panel.active{display:block;animation:fadeIn 0.25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
body { background:#E8E4EF; color:#2A1F35; font-family:'Jost',sans-serif; font-weight:300; min-height:100vh; }
.container { max-width:480px; margin:0 auto; padding:0 20px 80px; }

/* HEADER */
header { padding:44px 0 16px; text-align:center; }
.logo-line { width:36px; height:1px; background:#9B82B0; margin:0 auto 16px; }
h1 { font-family:'Cormorant Garamond',serif; font-weight:300; font-size:1.9rem; letter-spacing:0.18em; color:#2A1F35; text-transform:uppercase; }
.greeting { font-family:'Cormorant Garamond',serif; font-style:italic; font-size:0.95rem; color:#6B5878; margin-top:5px; }

/* DATE NAV */
.date-nav {
  display:flex; align-items:center; justify-content:center; gap:16px;
  margin-bottom:20px;
}
.date-nav-btn {
  width:32px; height:32px; border-radius:50%;
  background:white; border:2px solid #D4C8E0;
  color:#6B5878; font-size:1rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.15s; flex-shrink:0;
}
.date-nav-btn:hover { border-color:#9B82B0; color:#9B82B0; }
.date-nav-btn:disabled { opacity:0.3; cursor:default; }
.date-display {
  font-size:0.68rem; letter-spacing:0.2em; color:#6B5878;
  text-transform:uppercase; cursor:pointer; text-align:center;
  padding:6px 12px; border-radius:20px; transition:background 0.15s;
}
.date-display:hover { background:rgba(155,130,176,0.12); }
.viewing-past { background:#EDE7F5; color:#6B4F82; border-radius:20px; font-size:0.62rem; letter-spacing:0.1em; padding:4px 12px; text-align:center; margin-bottom:8px; }

/* STREAK */
.streak-card { background:#2A1F35; border-radius:12px; padding:18px 22px; display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
.streak-num { font-family:'Cormorant Garamond',serif; font-size:2.6rem; color:#E8D5F0; line-height:1; }
.streak-lbl { font-size:0.6rem; letter-spacing:0.22em; color:#9B82B0; text-transform:uppercase; margin-top:2px; }
.streak-dots { display:flex; gap:6px; }
.sdot { width:26px; height:26px; border-radius:50%; border:1.5px solid rgba(155,130,176,0.35); display:flex; align-items:center; justify-content:center; font-size:0.52rem; color:rgba(155,130,176,0.5); text-transform:uppercase; font-family:'Jost',sans-serif; }
.sdot.done { background:#9B82B0; border-color:#9B82B0; color:white; }
.sdot.today { border-color:#C8B4DC; color:#C8B4DC; }

/* POINTS */
.points-card { background:white; border-radius:12px; padding:22px 24px; margin-bottom:12px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 2px 12px rgba(42,31,53,0.08); }
.pts-today-num { font-family:'Cormorant Garamond',serif; font-size:3rem; color:#2A1F35; line-height:1; }
.pts-today-lbl { font-size:0.62rem; letter-spacing:0.18em; color:#6B5878; text-transform:uppercase; margin-top:3px; }
.pts-total-lbl { font-size:0.62rem; letter-spacing:0.18em; color:#6B5878; text-transform:uppercase; text-align:right; margin-bottom:3px; }
.pts-total-num { font-family:'Cormorant Garamond',serif; font-size:1.9rem; color:#2A1F35; text-align:right; }

/* REWARD CARD */
.reward-card { border-radius:12px; overflow:hidden; margin-bottom:28px; box-shadow:0 2px 12px rgba(42,31,53,0.10); }
.reward-img { width:100%; height:150px; object-fit:cover; display:block; background:#C8B4DC; }
.reward-body { background:white; padding:16px 20px; }
.reward-lbl { font-size:0.6rem; letter-spacing:0.26em; color:#6B5878; text-transform:uppercase; margin-bottom:5px; }
.reward-name { font-family:'Cormorant Garamond',serif; font-size:1.2rem; color:#2A1F35; margin-bottom:3px; }
.reward-countdown { font-size:0.75rem; color:#9B82B0; font-weight:500; margin-bottom:12px; }
.prog-bar { height:3px; background:#E8E4EF; border-radius:2px; overflow:hidden; margin-bottom:5px; }
.prog-fill { height:100%; background:linear-gradient(90deg,#9B82B0,#8FAAB8); border-radius:2px; transition:width 0.7s ease; }
.prog-labels { display:flex; justify-content:space-between; font-size:0.67rem; color:#6B5878; }

/* SECTION */
.section { margin-bottom:24px; }
.section-head { display:flex; align-items:center; gap:10px; margin-bottom:10px; padding:0 2px; }
.section-icon { width:30px; height:30px; border-radius:50%; background:#2A1F35; color:white; display:flex; align-items:center; justify-content:center; font-size:0.85rem; flex-shrink:0; }
.section-title { font-size:0.62rem; letter-spacing:0.28em; text-transform:uppercase; color:#2A1F35; font-weight:500; }
.section-pts { margin-left:auto; font-size:0.67rem; color:#9B82B0; font-weight:500; }
.habit-list { display:flex; flex-direction:column; gap:8px; }

.cat-status {
  width: 12px; height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-left: 6px;
  background: #D4C8E0;
  display: inline-block;
}
.cat-status.green { background: #7BC67E; }
.cat-status.orange { background: #FFB347; }
.cat-status.red { background: #E07070; }

.cat-note {
  font-size: 0.68rem;
  color: #9B82B0;
  padding: 0 2px 8px;
  font-style: italic;
}

/* HABIT ITEMS */
.habit-item { display:flex; align-items:center; gap:12px; padding:14px 16px; background:white; border-radius:10px; border:2px solid #D4C8E0; cursor:pointer; transition:all 0.18s ease; user-select:none; box-shadow:0 1px 6px rgba(42,31,53,0.06); }
.habit-item:active { transform:scale(0.98); }
.habit-item.checked { background:#F0EAF8; border-color:#9B82B0; }
.habit-item.past-locked { cursor:default; opacity:0.75; }

.cb { width:26px; height:26px; border-radius:50%; border:2.5px solid #9B82B0; background:white; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:0; transition:all 0.18s; color:white; }
.habit-item.checked .cb { background:#9B82B0; border-color:#9B82B0; font-size:0.75rem; }

.hname { font-size:0.88rem; color:#2A1F35; flex:1; font-weight:400; line-height:1.3; }
.habit-item.checked .hname { color:#9B82B0; text-decoration:line-through; text-decoration-color:#9B82B0; }

.habit-right { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
.hpts { font-size:0.7rem; color:#9B82B0; font-weight:600; background:#EDE7F5; padding:2px 7px; border-radius:20px; white-space:nowrap; }
.habit-item.checked .hpts { background:#9B82B0; color:white; }
.hstreak { font-size:0.62rem; color:#B09AC0; white-space:nowrap; }
.hstreak.active { color:#9B82B0; font-weight:500; }

/* DIVIDER */
.divider { height:1px; background:linear-gradient(90deg,transparent,#C8B4DC,transparent); margin:28px 0; }

/* REWARDS LIST */
.rewards-title { font-family:'Cormorant Garamond',serif; font-size:1.3rem; font-weight:300; color:#2A1F35; text-align:center; letter-spacing:0.1em; margin-bottom:14px; }
.ritem { display:flex; align-items:center; gap:14px; padding:14px 18px; margin-bottom:6px; background:white; border-radius:10px; border:2px solid #E8E4EF; transition:all 0.2s; box-shadow:0 1px 4px rgba(42,31,53,0.05); }
.ritem.unlocked { border-color:#8FAAB8; background:#EEF3F6; }
.ritem.current { border-color:#9B82B0; background:#F5F0FA; }
.rdot { width:8px; height:8px; border-radius:50%; background:#D4C8E0; flex-shrink:0; }
.ritem.unlocked .rdot { background:#8FAAB8; }
.ritem.current .rdot { background:#9B82B0; }
.rinfo { flex:1; }
.rname { font-size:0.85rem; color:#2A1F35; font-weight:400; }
.ritem.unlocked .rname { color:#5E8094; }
.ritem.current .rname { color:#6B4F82; font-weight:500; }
.rbudget { font-size:0.68rem; color:#6B5878; margin-top:2px; }
.rthresh { font-size:0.7rem; color:#9B82B0; font-weight:500; }

/* BUTTONS */
.btn-dark { display:block; width:100%; padding:15px; background:#2A1F35; border:none; color:#C8B4DC; font-family:'Jost',sans-serif; font-size:0.68rem; letter-spacing:0.22em; text-transform:uppercase; cursor:pointer; margin-top:10px; border-radius:10px; transition:background 0.2s; }
.btn-dark:hover { background:#3D2E50; }
.btn-ghost { display:block; width:100%; padding:14px; background:transparent; border:2px solid #D4C8E0; color:#6B5878; font-family:'Jost',sans-serif; font-size:0.68rem; letter-spacing:0.22em; text-transform:uppercase; cursor:pointer; margin-top:10px; border-radius:10px; transition:all 0.2s; }
.btn-ghost:hover { border-color:#9B82B0; color:#9B82B0; }

/* MODAL BASE */
.modal-overlay { position:fixed; inset:0; background:rgba(42,31,53,0.55); z-index:200; display:none; align-items:flex-end; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:white; border-radius:20px 20px 0 0; padding:28px 24px 48px; width:100%; max-width:480px; animation:slideUp 0.3s ease; max-height:90vh; overflow-y:auto; }
@keyframes slideUp { from{transform:translateY(30px);opacity:0} to{transform:translateY(0);opacity:1} }
.modal-handle { width:36px; height:4px; background:#D4C8E0; border-radius:2px; margin:0 auto 22px; }
.modal-title { font-family:'Cormorant Garamond',serif; font-size:1.5rem; color:#2A1F35; margin-bottom:20px; }

/* WEEK MODAL */
.wstat { display:flex; justify-content:space-between; align-items:center; padding:13px 0; border-bottom:1px solid #EDE7F5; }
.wstat:last-of-type { border-bottom:none; }
.wstat-lbl { font-size:0.82rem; color:#6B5878; }
.wstat-val { font-family:'Cormorant Garamond',serif; font-size:1.4rem; color:#2A1F35; }
.chart-wrap { margin-top:22px; }
.chart-lbl { font-size:0.6rem; letter-spacing:0.22em; text-transform:uppercase; color:#6B5878; margin-bottom:10px; }
.chart { display:flex; gap:6px; align-items:flex-end; height:70px; }
.bar-wrap { flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; height:100%; justify-content:flex-end; }
.bar { width:100%; background:#9B82B0; border-radius:3px; min-height:3px; }
.bar-lbl { font-size:0.58rem; color:#6B5878; text-transform:uppercase; }

/* CALENDAR MODAL */
.cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.cal-month { font-family:'Cormorant Garamond',serif; font-size:1.2rem; color:#2A1F35; }
.cal-nav { width:32px; height:32px; border-radius:50%; background:#F0EAF8; border:none; color:#6B5878; font-size:1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; margin-bottom:16px; }
.cal-day-name { font-size:0.58rem; text-align:center; color:#6B5878; text-transform:uppercase; padding:4px 0; letter-spacing:0.1em; }
.cal-day { aspect-ratio:1; border-radius:8px; border:none; background:transparent; font-size:0.78rem; color:#2A1F35; cursor:pointer; display:flex; align-items:center; justify-content:center; position:relative; font-family:'Jost',sans-serif; transition:all 0.15s; }
.cal-day:hover:not(:disabled) { background:#F0EAF8; }
.cal-day.has-data { background:#EDE7F5; color:#6B4F82; font-weight:500; }
.cal-day.perfect { background:#9B82B0; color:white; }
.cal-day.selected { outline:2px solid #9B82B0; outline-offset:1px; }
.cal-day.today-marker { font-weight:700; }
.cal-day:disabled { opacity:0.3; cursor:default; }
.cal-day.empty { cursor:default; }
.cal-legend { display:flex; gap:16px; font-size:0.65rem; color:#6B5878; margin-bottom:16px; flex-wrap:wrap; }
.cal-legend-item { display:flex; align-items:center; gap:5px; }
.cal-legend-dot { width:10px; height:10px; border-radius:3px; }

/* HABIT STATS MODAL */
.hstat-item { padding:14px 0; border-bottom:1px solid #EDE7F5; }
.hstat-item:last-child { border-bottom:none; }
.hstat-name { font-size:0.85rem; color:#2A1F35; font-weight:400; margin-bottom:6px; }
.hstat-row { display:flex; gap:16px; }
.hstat-box { flex:1; background:#F5F0FA; border-radius:8px; padding:10px; text-align:center; }
.hstat-box-val { font-family:'Cormorant Garamond',serif; font-size:1.4rem; color:#2A1F35; }
.hstat-box-lbl { font-size:0.6rem; color:#6B5878; text-transform:uppercase; letter-spacing:0.1em; margin-top:2px; }

/* TOAST */
.toast { position:fixed; bottom:36px; left:50%; transform:translateX(-50%) translateY(16px); background:#2A1F35; color:#C8B4DC; padding:12px 22px; font-size:0.75rem; letter-spacing:0.12em; opacity:0; transition:all 0.25s; z-index:300; border-radius:30px; white-space:nowrap; pointer-events:none; }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

/* CONFETTI */
.cp { position:fixed; border-radius:50%; pointer-events:none; z-index:999; animation:cf 2s ease forwards; }
@keyframes cf { 0%{transform:translateY(-10px) rotate(0);opacity:1} 100%{transform:translateY(100vh) rotate(540deg);opacity:0} }


.dc-panel{background:#E8E4EF}
.dc-panel .container{padding-top:0}
.dc-panel header{display:none}

.section-label::after{content:'';flex:1;height:1px;background:#e4ebe2}
.freq-badge{display:inline-flex;align-items:center;font-size:0.68rem;padding:2px 8px;border-radius:20px}
.freq-jednorazowo{background:#fafafa;color:#9e9e9e;border:1px solid #e0e0e0}
.freq-tygodniowo{background:#e3f2fd;color:#1565c0}
.freq-codziennie{background:#e8f5e9;color:#2e7d32}
.focus-panel{background:#f5f7f3}

.focus-plant-left{flex:1}
.focus-pct{font-family:'Cormorant Garamond',serif;font-size:3.2rem;color:#4a6741;line-height:1}

.focus-prog-track{height:4px;background:#e4ebe2;border-radius:2px;overflow:hidden;max-width:150px}
.focus-prog-fill{height:100%;background:linear-gradient(90deg,#4a6741,#8aaa78);border-radius:2px;transition:width 0.7s ease}
.focus-plant-right{flex-shrink:0}
.focus-card{display:flex;align-items:stretch;background:white;border-radius:10px;border:1px solid #e4ebe2;margin:0 16px 8px;overflow:hidden}
.focus-card.priority{border-left:3px solid #4a6741}
.focus-card.radar{border-left:3px solid #c8d9a0}
.focus-card-body{flex:1;padding:12px 14px}
.focus-card-area{font-size:0.68rem;letter-spacing:0.08em;color:#8aaa78;margin-bottom:4px;text-transform:uppercase}
.focus-card-step{font-size:0.9rem;color:#2c3828;line-height:1.4}
.focus-card-meta{margin-top:5px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.focus-card-goal{font-size:0.72rem;color:#a8bf90}
.focus-card-check{width:52px;display:flex;align-items:center;justify-content:center;background:#f9fbf7;border-left:1px solid #e4ebe2;cursor:pointer;flex-shrink:0}
.fc-circle{width:26px;height:26px;border-radius:50%;border:2px solid #c8d9a0;background:white;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.fc-circle.done{background:#4a6741;border-color:#4a6741}
.fc-circle.done::after{content:'';width:6px;height:10px;border:2px solid white;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px);display:block}
.wheel-panel{background:#f5f7f3;padding-bottom:80px}
.wheel-intro{background:#4a6741;padding:14px 20px;font-size:0.75rem;color:#c8d9a0;line-height:1.6}
.wheel-svg-wrap{display:flex;justify-content:center;padding:16px 0 8px}
.wheel-ranking-section{margin:0 16px}
.wheel-rank-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.wheel-rank-title{font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:#6a8858}
.wheel-rank-hint{font-size:0.68rem;color:#a8bf90;font-style:italic}
.wheel-item{background:white;border-radius:10px;border:1px solid #e4ebe2;margin-bottom:8px;overflow:hidden}
.wheel-item-head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.wheel-item.open .wheel-item-head{background:#f9fbf7}
.wheel-rank-num{font-family:'Cormorant Garamond',serif;font-size:1.1rem;color:#c8d9a0;width:20px;text-align:center;flex-shrink:0}

function syncAll(){
  sheetRead('CoachData').then(r=>{
    if(!r||typeof r!=='object') return;
    // New project system
    if(r.projects && Array.isArray(r.projects)) {
      const localProjects = projectsGet();
      // Merge: prefer local if has more data, use remote if local empty
      if(localProjects.length === 0) {
        localStorage.setItem(PROJ_KEY, JSON.stringify(r.projects));
        // Also set active project key
        const activeProj = r.projects.find(p => p.status === 'active');
        if(activeProj) localStorage.setItem(PROJ_ACTIVE_KEY, activeProj.id);
        renderCoach();
      } else {
        // Merge days from remote into local active project
        const remoteActive = r.projects.find(p => p.status === 'active');
        const localActive = localProjects.find(p => p.status === 'active');
        if(remoteActive && localActive && remoteActive.id === localActive.id) {
          localActive.days = Object.assign({}, remoteActive.days||{}, localActive.days||{});
          const remotePts = projCalcTotal(remoteActive);
          const localPts = projCalcTotal(localActive);
          if(remotePts > localPts) localActive.totalPoints = remotePts;
          localStorage.setItem(PROJ_KEY, JSON.stringify(localProjects));
          renderCoach();
        }
      }
      return;
    }
    // Legacy CoachData format
    const hasData=(r.totalPoints>0)||(r.days&&Object.keys(r.days).length>0);
    if(!hasData) return;
  });
  sheetRead('LifeGoals').then(r=>{
    if(!r||typeof r!=='object') return;
    // Merge: don't overwrite local customGoals or wheel data with old Sheets data
    const local = lgGet();
    const merged = Object.assign({}, r, {
      customGoals: local.customGoals || r.customGoals,
      wheelScores: local.wheelScores || r.wheelScores,
      wheelOrder: local.wheelOrder || r.wheelOrder,
    });
    // Keep any local keys that are checked (milestone completions)
    Object.keys(local).forEach(k => {
      if(k.includes('_') && local[k] === true) merged[k] = true;
    });
    localStorage.setItem(LG_KEY,JSON.stringify(merged));
    renderLG();renderFocus();
  });
}

const MAX_PTS = 12;

// Category scoring rules
const CAT_RULES = {
  food:    { pts: 2, individual: true },
  move:    { pts: 2, anyOf: ['freeletics','dance','steps','bike'] },
  alcohol: { pts: 2, individual: true },
  habits:  { pts: 2, allOf: ['sleep'] },
  growth:  { pts: 2, allOf: ['duolingo','piano'] },
  suppl:   { pts: 2, allOf: ['suppl1','suppl2'] },
};

// ADAPTIVE SCORING — recalculates every 21 days
const BASE_CATS = {
  food: 3, move: 4, alcohol: 2, habits: 1, growth: 1, suppl: 1
};
const CAT_MIN = { food: 1, move: 1, alcohol: 1, habits: 1, growth: 1, suppl: 1 };
const CAT_MAX = { food: 5, move: 5, alcohol: 2, habits: 1, growth: 1, suppl: 2 };
// alcohol, habits, growth, suppl are capped — main redistribution between food & move

function getAdaptivePts(state) {
  const today = new Date();
  const startKey = Object.keys(state.days||{}).sort()[0];
  if(!startKey) return {...BASE_CATS};

  // Find last 21-day cycle start
  const startDate = new Date(...startKey.split('-').map((v,i)=>i===1?v-1:v));
  const daysSinceStart = Math.floor((today - startDate) / 86400000);
  const cycleNum = Math.floor(daysSinceStart / 21);
  
  if(cycleNum === 0) return {...BASE_CATS};
  
  // Use stored adaptive pts if available and cycle hasn't changed
  if(state.adaptivePts && state.adaptiveCycle === cycleNum) {
    return state.adaptivePts;
  }
  
  // Calculate effectiveness for previous 21-day cycle
  const cycleStart = new Date(startDate);
  cycleStart.setDate(cycleStart.getDate() + (cycleNum-1)*21);
  const cycleEnd = new Date(startDate);
  cycleEnd.setDate(cycleEnd.getDate() + cycleNum*21);
  
  const effectiveness = {};
  const cats = Object.keys(BASE_CATS);
  cats.forEach(cat => {
    let possible = 0, earned = 0;
    for(let d=new Date(cycleStart); d<cycleEnd; d.setDate(d.getDate()+1)) {
      const key = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
      const dd = state.days?.[key]||{};
      possible += CAT_RULES[cat].pts;
      earned += calcCatPts(dd, cat);
    }
    effectiveness[cat] = possible > 0 ? earned/possible : 0;
  });
  
  // Redistribute: built (≥80%) loses 1, struggling (<50%) gains 1
  const pts = state.adaptivePts ? {...state.adaptivePts} : {...BASE_CATS};
  let pool = 0;
  const needMore = [];
  
  cats.forEach(cat => {
    if(effectiveness[cat] >= 0.80 && pts[cat] > CAT_MIN[cat]) {
      pts[cat] = Math.max(CAT_MIN[cat], pts[cat] - 1);
      pool++;
    } else if(effectiveness[cat] < 0.50) {
      needMore.push(cat);
    }
  });
  
  // Give pool to struggling cats, prioritize worst performers
  needMore.sort((a,b) => effectiveness[a] - effectiveness[b]);
  needMore.forEach(cat => {
    if(pool > 0 && pts[cat] < CAT_MAX[cat]) {
      pts[cat] = Math.min(CAT_MAX[cat], pts[cat] + 1);
      pool--;
    }
  });
  
  // Ensure total = 12
  return pts;
}

function checkAndApplyAdaptation(state) {
  const today = new Date();
  const startKey = Object.keys(state.days||{}).sort()[0];
  if(!startKey) return false;
  
  const startDate = new Date(...startKey.split('-').map((v,i)=>i===1?v-1:v));
  const daysSinceStart = Math.floor((today - startDate) / 86400000);
  const cycleNum = Math.floor(daysSinceStart / 21);
  
  if(cycleNum > 0 && state.adaptiveCycle !== cycleNum) {
    const newPts = getAdaptivePts(state);
    state.adaptivePts = newPts;
    state.adaptiveCycle = cycleNum;
    
    // Update CAT_RULES pts
    Object.keys(newPts).forEach(cat => {
      if(CAT_RULES[cat]) CAT_RULES[cat].pts = newPts[cat];
    });
    return true;
  }
  
  // Apply stored adaptive pts
  if(state.adaptivePts) {
    Object.keys(state.adaptivePts).forEach(cat => {
      if(CAT_RULES[cat]) CAT_RULES[cat].pts = state.adaptivePts[cat];
    });
  }
  return false;
}

// State
let viewingDate = new Date(); // the date being shown
let calViewDate = new Date(); // month shown in calendar

const API = 'https://script.google.com/macros/s/AKfycbziGFy6e4XT7h27RGbwOP_ha74SgGdjzVZZHBOAifqwaGNWjWVIWUR-OmDjysYOMV0i7g/exec';
const LS_KEY = 'dc5';
let saveTimer = null;

function gs() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)||'{}'); } catch { return {}; }
}

function ss(state) {
  // Instant local save
  localStorage.setItem(LS_KEY, JSON.stringify(state));
  // Debounced save to Sheets (1.5s)
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => syncToSheets(state), 1500);
}

function syncToSheets(state) {
  // Use no-cors POST to avoid CORS preflight issues
  fetch(SHEETS_API, {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify({action:'write', sheet:'CoachData', data: JSON.stringify(state)})
  }).catch(err => console.log('Sheets sync error:', err));
}

function syncFromSheets() {
  fetch(`${SHEETS_API}?action=read&sheet=CoachData`, {mode: 'cors'})
    .then(r => { if(!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
    .then(remote => {
      if (!remote || typeof remote !== 'object') return;
      const local = gs();
      const merged = {
        totalPoints: Math.max(remote.totalPoints||0, local.totalPoints||0),
        days: Object.assign({}, remote.days||{}, local.days||{})
      };
      // ALWAYS preserve local adaptation data
      if(local.adaptivePts) merged.adaptivePts = local.adaptivePts;
      if(local.adaptiveCycle !== undefined) merged.adaptiveCycle = local.adaptiveCycle;
      localStorage.setItem(LS_KEY, JSON.stringify(merged));
      renderAll(merged);
      // If local had higher total, push corrected data back to Sheets
      if(local.totalPoints > (remote.totalPoints||0)) {
        setTimeout(() => syncToSheets(merged), 1000);
      }
    })
    .catch(err => console.log('Sheets read error:', err));
}

function dateKey(d) { return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; }
function todayKey() { return dateKey(new Date()); }
function isToday() { return dateKey(viewingDate) === todayKey(); }

function dayAgo(d, ago) {
  const r = new Date(d); r.setDate(r.getDate()-ago); return r;
}

function getDayPts(state, key) {
  const dd = state.days?.[key]||{};
  return calcDayPts(dd);
}

function calcDayPts(dd) {
  // Uses CAT_RULES which is updated by adaptation
  return Object.keys(CAT_RULES).reduce((sum, cat) => sum + calcCatPts(dd, cat), 0);
}

function calcCatPts(dd, cat) {
  if(cat==='food') return (dd.calories?2:0)+(dd.notension?1:0);
  if(cat==='move') return ['freeletics','dance','steps','bike'].some(x=>dd[x])?4:0;
  if(cat==='alcohol') return (dd.noalc?1:0)+(dd.alcrule?1:0);
  if(cat==='habits') return dd.sleep?1:0;
  if(cat==='growth') return (dd.duolingo&&dd.piano)?1:0;
  if(cat==='suppl') return (dd.suppl1&&dd.suppl2)?1:0;
  return 0;
}

function calcStreak(state) {
  const today = new Date();
  let s=0, i=0;
  if(getDayPts(state, dateKey(dayAgo(today,0)))>0){s=1;i=1;}else i=1;
  while(i<=365){ if(getDayPts(state, dateKey(dayAgo(today,i)))>0){s++;i++;}else break; }
  return s;
}

function calcHabitStreak(state, habitId) {
  const today = new Date();
  let s=0, i=0;
  // start from today (not viewing date) for streak
  function check(ago){ const dd=state.days?.[dateKey(dayAgo(today,ago))]||{}; return !!dd[habitId]; }
  if(check(0)){s=1;i=1;}else i=1;
  while(i<=365){ if(check(i)){s++;i++;}else break; }
  return s;
}

function calcHabitTotal(state, habitId) {
  return Object.values(state.days||{}).reduce((sum,dd)=> sum+(dd[habitId]?1:0), 0);
}

function init() {
  const now = new Date(), h = now.getHours();
  const greetEl = document.getElementById('greeting'); if(greetEl) greetEl.textContent = h<12?'Dzień dobry, Mata 🌸':h<18?'Miłego popołudnia, Mata':'Dobry wieczór, Mata 🌙';
  const state = gs();
  if(!state.days) state.days={};
  if(!state.totalPoints) state.totalPoints=0;
  if(!state.days[todayKey()]) state.days[todayKey()]={};

  // Apply adaptation (updates CAT_RULES)
  try {
    const adapted = checkAndApplyAdaptation(state);
    if(adapted) setTimeout(()=>showAdaptationToast(state), 1000);
  } catch(e) { console.log('Adaptation error:', e); }

  // Recalculate totalPoints correctly per cycle
  try {
    const startKey = Object.keys(state.days||{}).sort()[0];
    if(startKey) {
      const startDate = new Date(...startKey.split('-').map((v,i)=>i===1?v-1:v));
      const cats = Object.keys(BASE_CATS);
      // Build cycle pts history
      const cyclePtsHistory = [dict=>dict];
      let curPts = {...BASE_CATS};
      const totalDays = Math.floor((new Date() - startDate) / 86400000);
      const totalCycles = Math.floor(totalDays / 21);
      const allCyclePts = [{...BASE_CATS}];
      for(let c=1; c<=totalCycles; c++) {
        const cStart = new Date(startDate); cStart.setDate(cStart.getDate()+(c-1)*21);
        const cEnd = new Date(startDate); cEnd.setDate(cEnd.getDate()+c*21);
        const eff = {};
        cats.forEach(cat => {
          let possible=0,earned=0;
          for(let d=new Date(cStart);d<cEnd;d.setDate(d.getDate()+1)){
            const key=`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
            const dd=state.days?.[key]||{};
            possible+=curPts[cat]; earned+=calcCatPts(dd,cat,curPts[cat]);
          }
          eff[cat]=possible>0?earned/possible:0;
        });
        const givers=cats.filter(c=>eff[c]>=0.80&&curPts[c]>CAT_MIN[c]).sort((a,b)=>eff[b]-eff[a]);
        const receivers=cats.filter(c=>eff[c]<0.50&&curPts[c]<CAT_MAX[c]).sort((a,b)=>eff[a]-eff[b]);
        const nextPts={...curPts};
        const n=Math.min(givers.length,receivers.length);
        for(let i=0;i<n;i++){nextPts[givers[i]]--;nextPts[receivers[i]]++;}
        allCyclePts.push({...nextPts});
        curPts=nextPts;
      }
      // Sum totalPoints per day using correct cycle pts
      let total=0;
      Object.keys(state.days).forEach(key=>{
        const dd=state.days[key];
        const d=new Date(...key.split('-').map((v,i)=>i===1?v-1:v));
        const dayNum=Math.floor((d-startDate)/86400000);
        const cycleIdx=Math.floor(dayNum/21);
        const dayPts=allCyclePts[Math.min(cycleIdx,allCyclePts.length-1)]||BASE_CATS;
        total+=cats.reduce((s,cat)=>s+calcCatPts(dd,cat,dayPts[cat]),0);
      });
      if(total !== state.totalPoints) {
        console.log('Recalc totalPoints:', state.totalPoints, '->', total);
        state.totalPoints = total;
        localStorage.setItem(LS_KEY, JSON.stringify(state));
        setTimeout(()=>syncToSheets(state), 500);
      }
    }
  } catch(e) { console.log('Recalc error:', e); }

  try { renderAll(state); } catch(e) {}
  // Render coach panel
  renderCoach();
  // Sync from Sheets in background
  syncFromSheets();
  setInterval(syncFromSheets, 30000);
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible') syncFromSheets();
  });
}

function getCatEffectiveness(state, cat) {
  const today = new Date();
  let possible = 0, earned = 0;
  for(let i=0; i<21; i++) {
    const d = new Date(today); d.setDate(d.getDate()-i);
    const key = `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`;
    const dd = state.days?.[key];
    if(!dd) continue;
    possible += CAT_RULES[cat].pts;
    earned += calcCatPts(dd, cat);
  }
  return possible > 0 ? earned/possible : null;
}

function renderStatusDots(state) {
  ['food','move','alcohol','habits','growth','suppl'].forEach(cat => {
    const el = document.getElementById(`status-${cat}`);
    if(!el) return;
    const eff = getCatEffectiveness(state, cat);
    if(eff === null) { el.className='cat-status'; return; }
    el.style.display = 'block';
    if(eff >= 0.80) {
      el.className = 'cat-status green';
      el.title = `${Math.round(eff*100)}% — opanowane! punkty by spadły`;
    } else if(eff >= 0.50) {
      el.className = 'cat-status orange';
      el.title = `${Math.round(eff*100)}% — w budowaniu`;
    } else {
      el.className = 'cat-status red';
      el.title = `${Math.round(eff*100)}% — wymaga uwagi, punkty by wzrosły`;
    }
  });
}

  });

      const startDate = new Date(...startKey.split('-').map((v,i)=>i===1?v-1:v));

    }
  }
  const dotsEl = document.getElementById('streakDots'); dotsEl.innerHTML='';

    const p=getDayPts(state,dateKey(dd2)), dot=document.createElement('div');
    dot.className='sdot'+(p>0?' done':'')+(i===0?' today':'');
    dot.textContent=DAYS[dd2.getDay()]; dotsEl.appendChild(dot);
  }

function toggle(el) {
  const state = gs();
  const vkey = dateKey(viewingDate);
  if (!state.days) state.days = {};
  if (!state.days[vkey]) state.days[vkey] = {};

  const id = el.dataset.id;
  const isChecked = !!state.days[vkey][id];

  // Calculate diff using calcDayPts (respects adaptive CAT_RULES)
  const ptsBefore = calcDayPts(state.days[vkey]);
  state.days[vkey][id] = !isChecked;
  const ptsAfter = calcDayPts(state.days[vkey]);
  const diff = ptsAfter - ptsBefore;

  state.totalPoints = Math.max(0, (state.totalPoints || 0) + diff);

  if (!isChecked) {
    toast(MSGS[Math.floor(Math.random() * MSGS.length)]);
    const allDone = HABITS.every(h => state.days[vkey][h.id]);
    if (allDone) setTimeout(confetti, 300);
  }

  ss(state);
  renderAll(state);
}

function renderCalendar() {
  const state = gs();
  const y=calViewDate.getFullYear(), m=calViewDate.getMonth();
  document.getElementById('calMonthLabel').textContent=`${MONTHS_LONG[m]} ${y}`;
  const grid=document.getElementById('calGrid'); grid.innerHTML='';
  // Day headers
  ['Pn','Wt','Śr','Cz','Pt','Sb','Nd'].forEach(d=>{ const el=document.createElement('div'); el.className='cal-day-name'; el.textContent=d; grid.appendChild(el); });
  const first=new Date(y,m,1).getDay(); // 0=Sun
  const offset=(first===0)?6:first-1; // Mon-based
  for(let i=0;i<offset;i++){ const el=document.createElement('div'); el.className='cal-day empty'; grid.appendChild(el); }
  const daysInMonth=new Date(y,m+1,0).getDate();
  const today=new Date();
  for(let d=1;d<=daysInMonth;d++){
    const dt=new Date(y,m,d);
    const key=dateKey(dt);
    const pts=getDayPts(state,key);
    const isFuture=dt>today;
    const el=document.createElement('div');
    el.className='cal-day';
    if(pts>=MAX_PTS) el.classList.add('perfect');
    else if(pts>0) el.classList.add('has-data');
    if(dateKey(dt)===dateKey(viewingDate)) el.classList.add('selected');
    if(dateKey(dt)===todayKey()) el.classList.add('today-marker');
    el.textContent=d;
    if(isFuture){ el.disabled=true; el.style.opacity='0.3'; }
    else { el.onclick=()=>{ viewingDate=new Date(y,m,d); document.getElementById('calModal').classList.remove('open'); renderAll(gs()); } }
    grid.appendChild(el);
  }
}

function calPrevMonth() { calViewDate.setMonth(calViewDate.getMonth()-1); renderCalendar(); }
function calNextMonth() {
  const next=new Date(calViewDate); next.setMonth(next.getMonth()+1);

}

function importData(event) {
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      if(!data.days) throw new Error('Nieprawidłowy format');
      if(!confirm(`Importować dane? Obecne dane zostaną zastąpione.`)) return;
      ss(data);
      syncToSheets(data);
      renderAll(gs());
      toast('Dane zaimportowane! ✨');
    } catch(err) {
      alert('Błąd importu — sprawdź czy plik jest poprawny.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

0;a<360;a+=45){const rad=a*Math.PI/180,px=cx+Math.cos(rad)*10,py=fy+Math.sin(rad)*10;s+=`<ellipse cx="${px}" cy="${py}" rx="7" ry="4.5" fill="${a%90===0?'#C8B4DC':'#D4C8E0'}" transform="rotate(${a} ${px} ${py})" opacity="0.88"/>`;}s+=`<circle cx="${cx}" cy="${fy}" r="6" fill="#FFD580"/>`;s+=`<circle cx="${cx-14}" cy="${fy+8}" r="4" fill="#C8B4DC" opacity="0.7"/>`;s+=`<circle cx="${cx+15}" cy="${fy+5}" r="4" fill="#D4C8E0" opacity="0.7"/>`;}svg.innerHTML=s;}
function renderFocus(){const lg=lgGet(),data=getLGData();let total=0,done=0;data.forEach(a=>a.goals.forEach(g=>{if(g.type==='tracker')return;g.ms.forEach((_,i)=>{total++;if(lg[g.id+'_'+i])done++;});}));const pct=total?Math.round(done/total*100):0;const pel=document.getElementById('focusPct'),sel=document.getElementById('focusSub'),fel=document.getElementById('focusProgFill');if(pel)pel.textContent=pct+'%';if(sel)sel.textContent=done+' / '+total+' kroków ukończonych';if(fel)fel.style.width=pct+'%';drawPlant(pct);const FMAP={codziennie:'↻ codziennie',tygodniowo:'↻ co tydzień',jednorazowo:'→ jednorazowo'};const pri=getPriorities();const pAreas=data.filter(a=>pri.includes(a.id));const rAreas=data.filter(a=>!pri.includes(a.id));function card(area,isPri){let next=null;for(const g of area.goals){if(g.type==='tracker')continue;for(let i=0;i<g.ms.length;i++){if(!lg[g.id+'_'+i]){next={gid:g.id,idx:i,ms:g.ms[i],gt:g.title};break;}}if(next)break;}if(!next)return `<div class="focus-card ${isPri?'priority':'radar'}" style="padding:12px 16px"><span style="font-size:0.85rem;color:#6a8858;font-style:italic">${area.emoji} ${area.name} — ukończone! 🎉</span></div>`;const checked=lg[next.gid+'_'+next.idx];return `<div class="focus-card ${isPri?'priority':'radar'}"><div class="focus-card-body"><div class="focus-card-area">${area.emoji} ${area.name}</div><div class="focus-card-step">${next.ms.t}</div><div class="focus-card-meta"><span class="freq-badge freq-${next.ms.f}">${FMAP[next.ms.f]}</span><span class="focus-card-goal">${next.gt}</span></div></div><div class="focus-card-check" onclick="lgToggleMs('${next.gid}',${next.idx})"><div class="fc-circle${checked?' done':''}"></div></div></div>`;}const focusEl=document.getElementById('focusContent');if(focusEl)focusEl.innerHTML=`<div class="section-label" style="margin-top:16px">🎯 Priorytety</div>`+pAreas.map(a=>card(a,true)).join('')+`<div class="section-label" style="margin-top:8px">📋 Na radarze</div>`+rAreas.map(a=>card(a,false)).join('');}

function getLGData(){const custom=(lgGet().customGoals)||{};return LG_DATA.map(area=>{const ac=custom[area.id]||{};const base=area.goals.map(g=>{const ov=ac[g.id]||{};return{...g,title:ov.title||g.title,tag:ov.tag||g.tag,ms:ov.ms||g.ms};});return{...area,goals:[...base,...(ac.__extra||[])]};});}

function lgSaveTracker(tid){const inp=document.getElementById('lginp_'+tid);if(!inp||inp.value==='')return;const lg=lgGet();lg['tracker_'+tid]=parseFloat(inp.value);lgSet(lg);renderLG();showToast('✓ Pomiar zapisany!');}
function lgToggleGoal(id){lgOpenGoals[id]=!lgOpenGoals[id];renderLG();}

function lgSaveGoalField(areaId,gid,field,val){const lg=lgGet();if(!lg.customGoals)lg.customGoals={};if(!lg.customGoals[areaId])lg.customGoals[areaId]={};if(!lg.customGoals[areaId][gid])lg.customGoals[areaId][gid]={};lg.customGoals[areaId][gid][field]=val;lgSet(lg);}
function lgGetMs(areaId,gid){const data=getLGData();return[...(data.find(a=>a.id===areaId)?.goals.find(g=>g.id===gid)?.ms||[])];}
function lgSaveMs(areaId,gid,ms){const lg=lgGet();if(!lg.customGoals)lg.customGoals={};if(!lg.customGoals[areaId])lg.customGoals[areaId]={};if(!lg.customGoals[areaId][gid])lg.customGoals[areaId][gid]={};const data=getLGData(),goal=data.find(a=>a.id===areaId)?.goals.find(g=>g.id===gid);if(!lg.customGoals[areaId][gid].title&&goal)lg.customGoals[areaId][gid].title=goal.title;if(!lg.customGoals[areaId][gid].tag&&goal)lg.customGoals[areaId][gid].tag=goal.tag;lg.customGoals[areaId][gid].ms=ms;lgSet(lg);}

function lgDelMs(areaId,gid,idx){const ms=lgGetMs(areaId,gid);ms.splice(idx,1);lgSaveMs(areaId,gid,ms);renderLG();}
function lgMoveMs(areaId,gid,idx,dir){const ms=lgGetMs(areaId,gid),to=idx+dir;if(to<0||to>=ms.length)return;[ms[idx],ms[to]]=[ms[to],ms[idx]];lgSaveMs(areaId,gid,ms);renderLG();}
function lgUpdateMs(areaId,gid,idx,field,val){const ms=lgGetMs(areaId,gid);if(ms[idx])ms[idx]={...ms[idx],[field]:val};lgSaveMs(areaId,gid,ms);}
function lgAddGoal(areaId){const lg=lgGet();if(!lg.customGoals)lg.customGoals={};if(!lg.customGoals[areaId])lg.customGoals[areaId]={};if(!lg.customGoals[areaId].__extra)lg.customGoals[areaId].__extra=[];const id='custom_'+Date.now();lg.customGoals[areaId].__extra.push({id,title:'Nowy cel',tag:'',ms:[],isCustom:true});lgSet(lg);lgEditingGoal=id;lgOpenGoals[id]=true;renderLG();setTimeout(()=>{const el=document.getElementById('goal-'+id);if(el)el.scrollIntoView({behavior:'smooth',block:'center'});},100);}

function projectsGet() {

}
function projectsSet(projects) {
  localStorage.setItem(PROJ_KEY, JSON.stringify(projects));

}
function activeProjectGet() {

// ============================================================
// PROJECT COACH — Date helpers
// ============================================================
function projDateKey(d) { return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; }
function projTodayKey() { return projDateKey(new Date()); }
function projDayAgo(d, ago) { const r = new Date(d); r.setDate(r.getDate()-ago); return r; }

// ============================================================
// PROJECT COACH — Points calculation
// ============================================================
function projCalcCatPts(dd, cat) {
  const items = cat.items || [];
  if (!items.length) return 0;
  const checked = items.filter(item => dd[cat.id + '_' + item.id]);
  if (cat.logic === 'all') {
    return checked.length === items.length ? cat.pts : 0;
  } else { // 'any'
    return checked.length > 0 ? cat.pts : 0;
  }
}

function projCalcDayPts(dd, project) {
  if (!project) return 0;
  return project.categories.reduce((sum, cat) => sum + projCalcCatPts(dd, cat), 0);
}

function projMaxDayPts(project) {
  return project.categories.reduce((sum, cat) => sum + cat.pts, 0);
}

function projCalcTotal(project) {
  if (!project) return 0;
  let total = 0;
  Object.keys(project.days || {}).forEach(key => {
    total += projCalcDayPts(project.days[key], project);
  });
  return total;
}

// ============================================================
// PROJECT COACH — Adaptive scoring (21-day cycles)
// ============================================================
function projCheckAdaptation(project) {
  if (!project || !project.startDate) return false;
  const start = new Date(project.startDate);
  const today = new Date();
  const daysSinceStart = Math.floor((today - start) / 86400000);
  const cycleNum = Math.floor(daysSinceStart / 21);
  if (cycleNum === 0 || cycleNum === (project.adaptiveCycle || 0)) return false;

  // Calculate effectiveness per category for last cycle
  const cStart = new Date(start); cStart.setDate(cStart.getDate() + (cycleNum-1)*21);
  const cEnd = new Date(start); cEnd.setDate(cEnd.getDate() + cycleNum*21);
  
  const eff = {};
  project.categories.forEach(cat => {
    let possible = 0, earned = 0;
    for (let d = new Date(cStart); d < cEnd; d.setDate(d.getDate()+1)) {
      const key = projDateKey(d);
      const dd = project.days?.[key] || {};
      possible += cat.pts;
      earned += projCalcCatPts(dd, cat);
    }
    eff[cat.id] = possible > 0 ? earned / possible : 0;
  });

  // Find worst and best
  const sorted = [...project.categories].sort((a,b) => eff[a.id] - eff[b.id]);
  const worst = sorted[0];
  const best = sorted[sorted.length-1];

  const changes = [];
  if (eff[worst.id] < 0.5 && worst.pts < 4) {
    worst.pts = Math.min(4, worst.pts + 1);
    changes.push({cat: worst.id, dir: 'up', eff: Math.round(eff[worst.id]*100)});
  }
  if (eff[best.id] >= 0.8 && best.pts > 1 && best.id !== worst.id) {
    best.pts = Math.max(1, best.pts - 1);
    changes.push({cat: best.id, dir: 'down', eff: Math.round(eff[best.id]*100)});
  }

  if (changes.length) {
    project.adaptiveCycle = cycleNum;
    project.pendingReflection = {
      cycle: cycleNum,
      changes,
      eff,
      date: projTodayKey()
    };
    return true;
  }
  project.adaptiveCycle = cycleNum;
  return false;
}

// ============================================================
// PROJECT COACH — Rewards calculation
// ============================================================
function projCalcRewards(project) {
  const maxPts = projMaxDayPts(project);
  const duration = project.duration || 30;
  const budget = project.budget || 0;
  
  const TIERS = [
    {pct: 0.01, budgetPct: 0.01},
    {pct: 0.03, budgetPct: 0.02},
    {pct: 0.07, budgetPct: 0.03},
    {pct: 0.14, budgetPct: 0.04},
    {pct: 0.30, budgetPct: 0.10},
    {pct: 0.50, budgetPct: 0.15},
    {pct: 0.75, budgetPct: 0.25},
    {pct: 1.00, budgetPct: 0.40},
  ];

  return TIERS.map((tier, i) => ({
    id: `r${i+1}`,
    threshold: Math.round(tier.pct * duration * maxPts),
    payout: Math.round(tier.budgetPct * budget),
    pct: Math.round(tier.pct * 100),
    budgetPct: Math.round(tier.budgetPct * 100),
  }));
}

function coachSaveProject(activate) {
  // If editing existing project, save as edit
  if (coachDraft._editingId) { projSaveEdit(); return; }
  const projects = projectsGet();
  const rewards = projCalcRewards(coachDraft);
  coachDraft.rewards = rewards;
  coachDraft.startDate = activate ? new Date().toISOString() : null;
  
  if (activate) {
    // Check if there's an active project
    const currentActive = projects.find(p => p.status === 'active');
    if (currentActive) {
      if (!confirm(`Projekt "${currentActive.name}" jest aktywny. Przełączyć na On-Hold?`)) return;
      currentActive.status = 'on-hold';
    }
    coachDraft.status = 'active';
    localStorage.setItem(PROJ_ACTIVE_KEY, coachDraft.id);
  } else {
    coachDraft.status = 'draft';
  }
  
  projects.push(coachDraft);
  projectsSet(projects);
  coachView = 'dashboard';
  coachDraft = null;
  coachCreateStep = 1;
  renderCoach();
  showToast(activate ? '🚀 Projekt aktywowany!' : '📋 Zapisano jako draft');
}

// ============================================================
// PROJECT COACH — Toggle habit
// ============================================================
function projToggle(el) {
  const projects = projectsGet();
  const project = projects.find(p => p.id === localStorage.getItem(PROJ_ACTIVE_KEY));
  if (!project) return;

  const vkey = projDateKey(coachViewingDate);
  if (!project.days) project.days = {};
  if (!project.days[vkey]) project.days[vkey] = {};

  const key = el.dataset.key;
  const isChecked = !!project.days[vkey][key];
  
  const ptsBefore = projCalcDayPts(project.days[vkey], project);
  project.days[vkey][key] = !isChecked;
  const ptsAfter = projCalcDayPts(project.days[vkey], project);
  
  project.totalPoints = Math.max(0, (project.totalPoints || 0) + (ptsAfter - ptsBefore));

  // Check adaptation
  const adapted = projCheckAdaptation(project);

  projectsSet(projects);
  
  if (!isChecked) toast(MSGS[Math.floor(Math.random() * MSGS.length)]);
  
  renderCoach();
  
  if (adapted && project.pendingReflection) {
    setTimeout(() => showReflectionPrompt(project), 800);
  }
}

// PROJECT COACH — Reflection
// ============================================================
function showReflectionPrompt(project) {
  const r = project.pendingReflection;
  if (!r) return;
  const catNames = {};
  project.categories.forEach(c => catNames[c.id] = c.name);
  
  const changesHTML = r.changes.map(ch => {
    const icon = ch.dir === 'up' ? '⬆️' : '⬇️';
    const desc = ch.dir === 'up' ? 'dostaje +1 pkt (była słaba: ' + ch.eff + '%)' : 'traci 1 pkt (była świetna: ' + ch.eff + '%)';
    return `<div class="reflection-change">${icon} <strong>${catNames[ch.cat]}</strong> — ${desc}</div>`;
  }).join('');

  const worstCat = r.changes.find(c => c.dir === 'up');
  
  document.getElementById('reflectionModal').innerHTML = `
    <div class="modal-overlay open" onclick="closeReflection(event)">
      <div class="modal" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <div class="modal-title">🔄 Koniec cyklu ${r.cycle} — czas na refleksję</div>
        <div style="margin-bottom:16px;font-size:0.85rem;color:#6B5878;line-height:1.6">
          Minęło 21 dni. System dostosował punktację:
        </div>
        ${changesHTML}
        ${worstCat ? `
        <div style="margin:20px 0 8px;font-size:0.85rem;font-weight:500;color:#2A1F35">
          Co sprawiało trudność z kategorią <strong>${catNames[worstCat.cat]}</strong>?
        </div>
        <textarea id="reflectionText" style="width:100%;border:1px solid #D4C8E0;border-radius:10px;padding:12px;font-family:'DM Sans',sans-serif;font-size:0.85rem;min-height:80px;outline:none;resize:none" placeholder="Napisz co poszło nie tak, co możesz zmienić..."></textarea>
        ` : ''}
        <div style="margin-top:8px;font-size:0.75rem;color:#9B82B0;font-style:italic">
          Refleksja zostanie zapisana w historii projektu.
        </div>
        <button onclick="saveReflection()" class="btn-dark" style="margin-top:16px">Zapisz i kontynuuj</button>
      </div>
    </div>`;
  document.getElementById('reflectionModal').style.display = 'block';
}

function saveReflection() {
  const text = document.getElementById('reflectionText')?.value || '';
  const projects = projectsGet();
  const project = projects.find(p => p.id === localStorage.getItem(PROJ_ACTIVE_KEY));
  if (project && project.pendingReflection) {
    if (!project.reflections) project.reflections = [];
    project.reflections.push({...project.pendingReflection, text, savedAt: new Date().toISOString()});
    delete project.pendingReflection;
    projectsSet(projects);
  }
  document.getElementById('reflectionModal').style.display = 'none';
  document.getElementById('reflectionModal').innerHTML = '';
  renderCoach();
}

function closeReflection(e) {
  if (e.target === e.currentTarget) {
    document.getElementById('reflectionModal').style.display = 'none';
  }
}

// PROJECT COACH — Project management
// ============================================================
function projSetStatus(projId, newStatus) {
  const projects = projectsGet();
  const proj = projects.find(p => p.id === projId);
  if (!proj) return;

  if (newStatus === 'active') {
    const currentActive = projects.find(p => p.status === 'active' && p.id !== projId);
    if (currentActive) {
      if (!confirm(`Projekt "${currentActive.name}" jest aktywny. Przełączyć na On-Hold?`)) return;
      currentActive.status = 'on-hold';
    }
    proj.status = 'active';
    if (!proj.startDate) proj.startDate = new Date().toISOString();
    localStorage.setItem(PROJ_ACTIVE_KEY, projId);
  } else {
    proj.status = newStatus;
    if (newStatus === 'closed') proj.closedAt = new Date().toISOString();
  }

  projectsSet(projects);
  renderCoach();
  showToast(`Status zmieniony na ${newStatus}`);
}

function projExport() {
  const projects = projectsGet();
  const data = JSON.stringify(projects, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const d = new Date();
  a.href = url;
  a.download = `intentional-backup-${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Dane wyeksportowane! 💾');
}

function projImport(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      // Handle both array of projects and single project
      const projects = Array.isArray(data) ? data : [data];
      if (!projects[0].categories) throw new Error('Nieprawidłowy format');
      if (!confirm('Importować dane? Obecne dane zostaną zastąpione.')) return;
      localStorage.setItem(PROJ_KEY, JSON.stringify(projects));
      if (projects.find(p => p.status === 'active')) {
        localStorage.setItem(PROJ_ACTIVE_KEY, projects.find(p => p.status === 'active').id);
      }
      sheetWrite('CoachData', {projects});
      renderCoach();
      toast('Dane zaimportowane! ✨');
    } catch(err) {
      alert('Błąd importu — sprawdź czy plik jest poprawny.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function projOpenStats() {
  const projects = projectsGet();
  const project = activeProjectGet();
  if (!project) return;

  const list = document.getElementById('habitStatsList');
  if (!list) return;
  list.innerHTML = '';

  const CAT_NAMES = {};
  project.categories.forEach(c => CAT_NAMES[c.id] = c.emoji + ' ' + c.name);

  // Per-habit streaks
  project.categories.forEach(cat => {
    cat.items.forEach(item => {
      const habitKey = cat.id + '_' + item.id;
      let streak = 0, total = 0;
      const today = new Date();
      // Total
      Object.values(project.days||{}).forEach(dd => { if(dd[habitKey]) total++; });
      // Streak
      for(let i=0;i<=365;i++) {
        const key = projDateKey(projDayAgo(today, i));
        if(project.days?.[key]?.[habitKey]) { streak++; }
        else if(i > 0) break;
      }
      const div = document.createElement('div');
      div.className = 'hstat-item';
      div.innerHTML = `<div class="hstat-name">${cat.emoji} ${item.name}</div>
        <div class="hstat-row">
          <div class="hstat-box"><div class="hstat-box-val">${streak}${streak>0?'🔥':''}</div><div class="hstat-box-lbl">Dni z rzędu</div></div>
          <div class="hstat-box"><div class="hstat-box-val">${total}</div><div class="hstat-box-lbl">Łącznie dni</div></div>
        </div>`;
      list.appendChild(div);
    });
  });

  // Category effectiveness
  const titleEl = document.createElement('div');
  titleEl.className = 'cat-stats-title';
  titleEl.textContent = 'Skuteczność kategorii';
  list.appendChild(titleEl);

  const start = new Date(project.startDate);
  const today = new Date();
  const totalDays = Math.floor((today - start) / 86400000);
  const totalCycles = Math.floor(totalDays / 21);

  project.categories.forEach(cat => {
    const cycles = [];
    for(let c=0; c<=totalCycles; c++) {
      const cStart = new Date(start); cStart.setDate(cStart.getDate()+c*21);
      const cEnd = new Date(start); cEnd.setDate(cEnd.getDate()+(c+1)*21);
      const isNow = c === totalCycles;
      const endDate = isNow ? today : cEnd;
      let possible=0, earned=0;
      for(let d=new Date(cStart);d<=endDate;d.setDate(d.getDate()+1)) {
        const key = projDateKey(d);
        if(!project.days?.[key]) continue;
        possible += cat.pts;
        earned += projCalcCatPts(project.days[key], cat);
      }
      const pct = possible > 0 ? Math.round(earned/possible*100) : null;
      cycles.push({num:c+1, pct, isCurrent:isNow});
    }
    function barColor(pct) {
      if(pct===null) return '#d0c8e0';
      if(pct>=80) return '#6ab87a';
      if(pct>=50) return '#a890d0';
      return '#d07080';
    }
    const cyclesHTML = cycles.map(cy=>`
      <div class="cat-cycle-row">
        <div class="cat-cycle-label">${cy.isCurrent?'Teraz':'Cykl '+cy.num}</div>
        <div class="cat-cycle-bar-wrap"><div class="cat-cycle-bar" style="width:${cy.pct||0}%;background:${barColor(cy.pct)}"></div></div>
        <div class="cat-cycle-pct">${cy.pct!==null?cy.pct+'%':'–'}</div>
      </div>`).join('');
    const card = document.createElement('div');
    card.className = 'cat-stat-card';
    card.innerHTML = `<div class="cat-stat-header">
      <div class="cat-stat-name">${cat.emoji} ${cat.name}</div>
      <div class="cat-stat-pts">${cat.pts} pkt teraz</div>
    </div><div class="cat-cycles">${cyclesHTML}</div>`;
    list.appendChild(card);
  });

  document.getElementById('habitModal').classList.add('open');
}


function projEdit(projId) {
  const projects = projectsGet();
  const proj = projects.find(p => p.id === projId);
  if (!proj) return;
  
  // Load project into draft for editing
  coachDraft = JSON.parse(JSON.stringify(proj)); // deep copy
  coachDraft._editingId = projId; // mark as edit, not new
  coachCreateStep = 1;
  coachView = 'create';
  renderCoach();
}

function projSaveEdit() {
  const projects = projectsGet();
  const idx = projects.findIndex(p => p.id === coachDraft._editingId);
  if (idx === -1) return;
  
  // Preserve days, status, startDate, totalPoints from original
  const original = projects[idx];
  coachDraft.days = original.days;
  coachDraft.status = original.status;
  coachDraft.startDate = original.startDate;
  coachDraft.totalPoints = original.totalPoints;
  coachDraft.adaptiveCycle = original.adaptiveCycle;
  coachDraft.reflections = original.reflections;
  
  // Recalculate rewards with updated settings
  coachDraft.rewards = projCalcRewards(coachDraft);
  
  delete coachDraft._editingId;
  projects[idx] = coachDraft;
  projectsSet(projects);
  
  coachView = 'projects';
  coachDraft = null;
  coachCreateStep = 1;
  renderCoach();
  showToast('Projekt zaktualizowany! ✓');
}


function syncAndReload() {
  showToast('Synchronizowanie...');
  sheetRead('CoachData').then(r => {
    if (!r || typeof r !== 'object') { showToast('Brak danych w Sheets'); return; }
    if (r.projects && Array.isArray(r.projects)) {
      localStorage.setItem(PROJ_KEY, JSON.stringify(r.projects));
      const activeProj = r.projects.find(p => p.status === 'active');
      if (activeProj) localStorage.setItem(PROJ_ACTIVE_KEY, activeProj.id);
      renderCoach();
      showToast('Dane zsynchronizowane! ✓');
    } else {
      showToast('Stary format — migrowanie...');
      migrateOldProject();
      renderCoach();
    }
  }).catch(() => showToast('Błąd połączenia z Sheets'));
}

function renderCoach() {
  const panel = document.getElementById('panel-coach');
  if (!panel) return;

  migrateOldProject();
  const project = activeProjectGet();
  
  if (coachView === 'create') {
    panel.innerHTML = renderCreateWizard();
    return;
  }
  if (coachView === 'projects') {
    panel.innerHTML = renderProjectsList();
    return;
  }
  
  // Dashboard view
  panel.innerHTML = renderDashboard(project);
}

function renderProjectsList() {
  const projects = projectsGet();

  // Filter out closed projects older than 7 days
  const visible = projects.filter(p => {
    if (p.status !== 'closed') return true;
    const closed = new Date(p.closedAt || 0);
    return (now - closed) < 7 * 86400000;
  });

  const statusLabel = {active:'Aktywny',draft:'Draft','on-hold':'On Hold',closed:'Zamknięty'};
  const statusColor = {active:'#4a6741',draft:'#9B82B0','on-hold':'#8FAAB8',closed:'#ccc'};

  const projHTML = visible.length === 0 ? 
    '<div style="text-align:center;padding:40px;color:#9B82B0">Brak projektów</div>' :
    visible.map(proj => {
      const total = projCalcTotal(proj);
      const maxPts = projMaxDayPts(proj);
      const actions = [];
      if (proj.status !== 'active') actions.push(`<button onclick="projSetStatus('${proj.id}','active')" class="proj-action-btn">Aktywuj</button>`);
      if (proj.status === 'active') actions.push(`<button onclick="projSetStatus('${proj.id}','on-hold')" class="proj-action-btn">Pause</button>`);
      if (proj.status !== 'closed') actions.push(`<button onclick="projSetStatus('${proj.id}','closed')" class="proj-action-btn danger">Zamknij</button>`);
      if (proj.status === 'closed') actions.push(`<button onclick="projSetStatus('${proj.id}','active')" class="proj-action-btn">Reaktywuj</button>`);
      actions.push(`<button onclick="projEdit('${proj.id}')" class="proj-action-btn">✎ Edytuj</button>`);

      return `<div class="proj-list-item">
        <div class="proj-list-header">
          <div>
            <div class="proj-list-name">${proj.name}</div>
            <div class="proj-list-meta">${proj.categories.length} kategorii · ${maxPts} pkt/dzień · ${proj.duration} dni</div>
          </div>
          <div class="proj-status-badge" style="background:${statusColor[proj.status]}20;color:${statusColor[proj.status]}">${statusLabel[proj.status]}</div>
        </div>
        <div class="proj-list-stats">
          <span>${total} pkt zdobytych</span>
          ${proj.budget ? `<span>${proj.budget} zł budżet</span>` : ''}
        </div>
        <div class="proj-list-actions">${actions.join('')}</div>
      </div>`;
    }).join('');

  return `
    <div class="proj-dashboard">
      <div class="proj-header-bar">
        <div class="proj-project-name">Moje projekty</div>
        <button onclick="coachView='dashboard';renderCoach()" class="proj-icon-btn">✕</button>
      </div>
      <div style="padding:16px">
        ${projHTML}
        <button onclick="coachStartCreate()" class="proj-btn-primary" style="width:100%;margin-top:16px">+ Nowy projekt</button>
      </div>
    </div>`;
}


// INIT

migrateOldProject();
try { init(); } catch(e) { console.error('init error:', e); }
setTimeout(syncAll,1000);
setInterval(syncAll,30000);
document.addEventListener('visibilitychange',()=>{if(document.visibilityState==='visible')syncAll();});
try { switchTab(activeTab); } catch(e) { console.error('switchTab error:', e); try{switchTab('coach');}catch(e2){} }

</script>
</body>
</html>
